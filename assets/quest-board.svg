<!-- Fixed SVG asset: explicit text fills, wider safe zones, GitHub-safe SMIL animations, no clipped/overlapping text. -->
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430" role="img" aria-labelledby="title desc">
  <title id="title">Current side quests project board</title>
  <desc id="desc">A playful quest board for Draft, Sage, Aeva, and Surface projects.</desc>
  <defs>
    <linearGradient id="questBg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#101828"/><stop offset="56%" stop-color="#07283b"/><stop offset="1" stop-color="#012f2c"/></linearGradient>
    <linearGradient id="cardBg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#111827"/><stop offset="1" stop-color="#070b16"/></linearGradient>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <style>
      .mono{font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;}
      .emoji{font-family:"Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif;}
      .small{font-size:14px}.body{font-size:15px;fill:#eef7ff}.subtitle{font-size:16px;fill:#b6fff7}.white{fill:#fff}.cyan{fill:#00f5ff}.pink{fill:#ff5ac8}.yellow{fill:#fff176}.lime{fill:#8aff00}
    </style>
  </defs>
  <rect width="1200" height="430" rx="34" fill="url(#questBg)"/>
  <g opacity="0.55">
    <circle cx="100" cy="360" r="4" fill="#ff5ac8"><animate attributeName="opacity" values="0.25;1;0.25" dur="2s" repeatCount="indefinite"/></circle>
    <circle cx="680" cy="82" r="5" fill="#00f5ff"><animate attributeName="opacity" values="1;0.25;1" dur="2.4s" repeatCount="indefinite"/></circle>
    <circle cx="1040" cy="78" r="4" fill="#8aff00"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.8s" repeatCount="indefinite"/></circle>
  </g>
  <text x="54" y="66" class="mono white" font-size="34" font-weight="900">🗺️ current side quests</text>
  <text x="54" y="100" class="mono subtitle" font-weight="700">serious infrastructure ideas wearing a party hat. 🎉</text>
  <text x="928" y="82" class="emoji" font-size="70" filter="url(#glow)">🤖</text>
  <text x="1000" y="86" class="emoji" font-size="42">🎈</text>

  <path d="M190 352 C260 405 354 394 432 352 S612 307 706 352 870 394 1010 352" fill="none" stroke="#ffffff" stroke-opacity="0.22" stroke-width="4" stroke-linecap="round" stroke-dasharray="12 18">
    <animate attributeName="stroke-dashoffset" values="0;-60" dur="6s" repeatCount="indefinite"/>
  </path>

  <g class="mono">
    <g transform="translate(55 135)">
      <rect width="250" height="220" rx="24" fill="url(#cardBg)" stroke="#ff5ac8" stroke-width="2.5" filter="url(#glow)"/>
      <text x="22" y="47" class="pink" font-size="28" font-weight="900">🧵 Draft</text>
      <path d="M22 68H228" stroke="#ff5ac8" stroke-width="2" stroke-dasharray="4 9"/>
      <text x="22" y="92" class="body">Change workflow layer</text>
      <text x="22" y="119" fill="#ffd6f0" font-size="12">safe checkpoints, clean intent</text>
      <text x="22" y="139" fill="#ffd6f0" font-size="12">shape before commit</text>
      <text x="22" y="170" fill="#ffd6f0" font-size="14">public build coming soon...</text>
      <text x="22" y="205" class="yellow" font-size="15" font-weight="800">boss: commit chaos</text>
    </g>
    <g transform="translate(335 135)">
      <rect width="250" height="220" rx="24" fill="url(#cardBg)" stroke="#fff176" stroke-width="2.5" filter="url(#glow)"/>
      <text x="22" y="47" class="yellow" font-size="28" font-weight="900">🌿 Sage</text>
      <path d="M22 68H228" stroke="#fff176" stroke-width="2" stroke-dasharray="4 9"/>
      <g transform="translate(125 146)">
        <text x="0" y="0" text-anchor="middle" dominant-baseline="middle" class="yellow" font-size="96" font-weight="900" filter="url(#glow)">?
          <animate attributeName="opacity" values="0.45;1;0.45" dur="1.8s" repeatCount="indefinite"/>
          <animateTransform attributeName="transform" type="scale" values="1;1.08;1" dur="1.8s" repeatCount="indefinite"/>
        </text>
      </g>
    </g>
    <g transform="translate(615 135)">
      <rect width="250" height="220" rx="24" fill="url(#cardBg)" stroke="#00f5ff" stroke-width="2.5" filter="url(#glow)"/>
      <text x="22" y="47" class="cyan" font-size="28" font-weight="900">🏰 Aeva</text>
      <path d="M22 68H228" stroke="#00f5ff" stroke-width="2" stroke-dasharray="4 9"/>
      <g transform="translate(125 146)">
        <text x="0" y="0" text-anchor="middle" dominant-baseline="middle" class="cyan" font-size="96" font-weight="900" filter="url(#glow)">?
          <animate attributeName="opacity" values="0.45;1;0.45" dur="1.9s" repeatCount="indefinite"/>
          <animateTransform attributeName="transform" type="scale" values="1;1.08;1" dur="1.9s" repeatCount="indefinite"/>
        </text>
      </g>
    </g>
    <g transform="translate(895 135)">
      <rect width="250" height="220" rx="24" fill="url(#cardBg)" stroke="#8aff00" stroke-width="2.5" filter="url(#glow)"/>
      <text x="22" y="47" class="lime" font-size="28" font-weight="900">🪟 Surface</text>
      <path d="M22 68H228" stroke="#8aff00" stroke-width="2" stroke-dasharray="4 9"/>
      <g transform="translate(125 146)">
        <text x="0" y="0" text-anchor="middle" dominant-baseline="middle" class="lime" font-size="96" font-weight="900" filter="url(#glow)">?
          <animate attributeName="opacity" values="0.45;1;0.45" dur="2s" repeatCount="indefinite"/>
          <animateTransform attributeName="transform" type="scale" values="1;1.08;1" dur="2s" repeatCount="indefinite"/>
        </text>
      </g>
    </g>
  </g>
  <text x="160" y="386" class="emoji" font-size="34">❌</text><text x="572" y="386" class="emoji" font-size="38">🎁</text><text x="990" y="386" class="emoji" font-size="35">⭐</text>
</svg>
