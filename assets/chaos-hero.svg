<!-- Fixed SVG asset: explicit text fills, wider safe zones, GitHub-safe SMIL animations, no clipped/overlapping text. -->
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Shiv.exe cheerful chaos systems hero</title>
  <desc id="desc">Playful neon terminal banner for Shiv Deepak Sharma, backend systems goblin, AI infrastructure tinkerer, and trust-layer builder.</desc>
  <defs>
    <linearGradient id="heroBg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#120018"/>
      <stop offset="34%" stop-color="#15145c"/>
      <stop offset="68%" stop-color="#042b38"/>
      <stop offset="100%" stop-color="#063326"/>
    </linearGradient>
    <linearGradient id="termStroke" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#00f5ff"/>
      <stop offset="46%" stop-color="#9b5cff"/>
      <stop offset="100%" stop-color="#ff5ac8"/>
    </linearGradient>
    <linearGradient id="rainbowTrail" x1="0" x2="1">
      <stop offset="0%" stop-color="#00f5ff"/>
      <stop offset="24%" stop-color="#8aff00"/>
      <stop offset="50%" stop-color="#fff176"/>
      <stop offset="76%" stop-color="#ff5ac8"/>
      <stop offset="100%" stop-color="#9b5cff"/>
    </linearGradient>
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="52%">
      <stop offset="0%" stop-color="#fff176" stop-opacity="0.95"/>
      <stop offset="45%" stop-color="#ff5ac8" stop-opacity="0.48"/>
      <stop offset="100%" stop-color="#00f5ff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="heroGrid" width="38" height="38" patternUnits="userSpaceOnUse">
      <path d="M38 0H0V38" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="strongGlow" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <style>
      .mono{font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;}
      .emoji{font-family:"Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif;}
      .white{fill:#ffffff}.cyan{fill:#00f5ff}.lime{fill:#8aff00}.yellow{fill:#fff176}.muted{fill:#c9d4ff}.pink{fill:#ff5ac8}
    </style>
  </defs>

  <rect width="1200" height="420" rx="34" fill="url(#heroBg)"/>
  <rect width="1200" height="420" rx="34" fill="url(#heroGrid)"/>
  <circle cx="1015" cy="76" r="150" fill="url(#sunGlow)">
    <animate attributeName="r" values="135;165;135" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="148" cy="348" r="150" fill="#00f5ff" opacity="0.10"/>

  <path d="M34 354 C190 254 292 388 447 308 S742 192 1128 284" fill="none" stroke="url(#rainbowTrail)" stroke-width="8" stroke-linecap="round" stroke-dasharray="22 18" opacity="0.9" filter="url(#softGlow)">
    <animate attributeName="stroke-dashoffset" values="0;-80" dur="5s" repeatCount="indefinite"/>
  </path>

  <g class="emoji" filter="url(#softGlow)">
  <!-- floating chaos particles / stickers -->
  <g opacity="0.95">
    <text x="68" y="74" font-size="38" transform="rotate(-12 68 74)">🚀</text>
    <animateTransform attributeName="transform" type="translate" values="0 0;0 -6;0 0" dur="4.4s" repeatCount="indefinite"/>
  </g>

  <g opacity="0.9">
    <text x="1062" y="88" font-size="34" transform="rotate(10 1062 88)">✨</text>
    <animateTransform attributeName="transform" type="translate" values="0 0;3 -5;0 0" dur="3.6s" repeatCount="indefinite"/>
  </g>

  <g opacity="0.88">
    <text x="1046" y="168" font-size="34" transform="rotate(-7 1046 168)">🧃</text>
    <animateTransform attributeName="transform" type="translate" values="0 0;-2 -4;0 0" dur="4.8s" repeatCount="indefinite"/>
  </g>

  <g opacity="0.78">
    <text x="32" y="224" font-size="26" transform="rotate(18 32 224)">✦</text>
    <animate attributeName="opacity" values="0.45;0.95;0.45" dur="2.8s" repeatCount="indefinite"/>
  </g>

  <g opacity="0.72">
    <text x="912" y="118" font-size="30" transform="rotate(-16 912 118)">✦</text>
    <animate attributeName="opacity" values="0.35;0.9;0.35" dur="3.2s" repeatCount="indefinite"/>
  </g>

  <g opacity="0.82">
    <text x="1116" y="292" font-size="24" transform="rotate(12 1116 292)">✦</text>
    <animate attributeName="opacity" values="0.4;0.85;0.4" dur="3.9s" repeatCount="indefinite"/>
  </g>

  <g opacity="0.86">
    <text x="722" y="58" font-size="25" transform="rotate(-8 722 58)">⚡</text>
    <animateTransform attributeName="transform" type="translate" values="0 0;0 -4;0 0" dur="3.4s" repeatCount="indefinite"/>
  </g>

  <g opacity="0.8">
    <text x="428" y="354" font-size="24" transform="rotate(9 428 354)">🛠️</text>
    <animateTransform attributeName="transform" type="translate" values="0 0;2 -3;0 0" dur="5s" repeatCount="indefinite"/>
  </g>

  <g opacity="0.84">
    <text x="998" y="338" font-size="26" transform="rotate(-10 998 338)">🧾</text>
    <animateTransform attributeName="transform" type="translate" values="0 0;-2 -5;0 0" dur="4.1s" repeatCount="indefinite"/>
  </g>

  <g opacity="0.9">
    <text x="1134" y="248" font-size="38" transform="rotate(8 1134 248)">👋</text>
    <animateTransform attributeName="transform" type="rotate" values="-8 1134 248;8 1134 248;-8 1134 248" dur="2.6s" repeatCount="indefinite"/>
  </g>
</g>

<!-- terminal window -->
<g transform="translate(80 86)">
  <rect x="0" y="0" width="795" height="244" rx="26" fill="#05091b" opacity="1" stroke="url(#termStroke)" stroke-width="3" filter="url(#strongGlow)"/>
  <circle cx="36" cy="40" r="11" fill="#ff4f7a"/>
  <circle cx="66" cy="40" r="11" fill="#fff176"/>
  <circle cx="96" cy="40" r="11" fill="#8aff00"/>

  <rect x="36" y="78" width="50" height="50" rx="10" fill="#07354d" stroke="#00f5ff" stroke-opacity="0.3"/>
  <text x="48" y="112" class="mono lime" font-size="38" font-weight="800">&gt;_</text>

  <text x="112" y="113" class="mono white" font-size="35" font-weight="900">./shiv.exe</text>
  <text x="355" y="113" class="mono lime" font-size="35" font-weight="900">--chaos-mode=happy</text>

  <text x="36" y="154" font-size="18" font-weight="700">
    <tspan class="mono cyan">backend systems goblin</tspan>
    <tspan class="emoji" dx="5">🐒</tspan>
    <tspan class="mono cyan" dx="5">| AI infra tinkerer</tspan>
    <tspan class="emoji" dx="5">🧠</tspan>
    <tspan class="mono cyan" dx="5">| trust-layer builder</tspan>
    <tspan class="emoji" dx="5">🛡️</tspan>
  </text>

  <text x="36" y="196" class="mono yellow" font-size="19" font-weight="700">mission: make agents less spooky and production less cursed</text>
  <text x="36" y="224" class="mono muted" font-size="18">status: caffeinated • debugging goblins • shipping tiny rockets</text>

  <rect x="36" y="254" width="68" height="7" rx="4" fill="#00f5ff">
    <animate attributeName="opacity" values="0.55;1;0.55" dur="1.6s" repeatCount="indefinite"/>
  </rect>
  <rect x="118" y="254" width="48" height="7" rx="4" fill="#ff5ac8">
    <animate attributeName="opacity" values="1;0.45;1" dur="1.8s" repeatCount="indefinite"/>
  </rect>
  <rect x="180" y="254" width="36" height="7" rx="4" fill="#fff176">
    <animate attributeName="opacity" values="0.45;1;0.45" dur="2s" repeatCount="indefinite"/>
  </rect>
</g>

<!-- cheerful robot mascot -->
  <g transform="translate(928 142)" filter="url(#softGlow)">
    <line x1="71" y1="2" x2="71" y2="42" stroke="#00f5ff" stroke-width="8" stroke-linecap="round"/>
    <circle cx="71" cy="2" r="10" fill="#ff9fba"/>
    <rect x="8" y="40" width="150" height="122" rx="31" fill="#07111f" stroke="#00f5ff" stroke-width="5"/>
    <rect x="33" y="72" width="100" height="54" rx="19" fill="#040711" stroke="#8aff00" stroke-width="3"/>
    <circle cx="63" cy="99" r="12" fill="#8aff00"><animate attributeName="r" values="12;15;12" dur="2.6s" repeatCount="indefinite"/></circle>
    <circle cx="105" cy="99" r="12" fill="#ff5ac8"><animate attributeName="r" values="15;12;15" dur="2.6s" repeatCount="indefinite"/></circle>
    <path d="M58 129 Q83 149 111 129" fill="none" stroke="#fff176" stroke-width="5" stroke-linecap="round"/>
    <circle cx="61" cy="173" r="8" fill="#00f5ff"/><circle cx="86" cy="173" r="8" fill="#ff5ac8"/><circle cx="110" cy="173" r="8" fill="#8aff00"/>
    <path d="M11 100 C-28 126 -40 140 -58 156" fill="none" stroke="#00f5ff" stroke-width="7" stroke-linecap="round"/>
    <path d="M155 96 C193 99 209 111 230 126" fill="none" stroke="#9b5cff" stroke-width="7" stroke-linecap="round"/>
    <ellipse cx="83" cy="188" rx="95" ry="20" fill="#000" opacity="0.35"/>
  </g>

  <text x="600" y="386" class="mono cyan" font-size="20" text-anchor="middle">production systems, but make it sparkle ✨</text>
</svg>